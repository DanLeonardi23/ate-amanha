# Cache longo para assets estáticos (imagens, fontes, libs)
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/supabase.min.js"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# HTML, JS e CSS: sempre busca a versão mais nova
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
